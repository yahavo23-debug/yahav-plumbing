    <script>
      // Dynamic manifest with logo from branding settings
      (function() {
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = 'https://xglagkbblribtztkkovo.supabase.co/functions/v1/get-manifest';
        document.head.appendChild(link);

        // Also set apple-touch-icon dynamically
        fetch('https://xglagkbblribtztkkovo.supabase.co/functions/v1/get-logo-url')
          .then(function(r) { return r.json(); })
          .then(function(d) {
            if (d && d.url) {
              var apple = document.createElement('link');
              apple.rel = 'apple-touch-icon';
              apple.href = d.url;
              document.head.appendChild(apple);
            }
          })
          .catch(function() {});
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
